name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine macOS signing mode
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer Certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Verify Certificate
        id: certificate
        if: steps.signing.outputs.enabled == 'true'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "identity=$CERT_ID" >> "$GITHUB_OUTPUT"
          echo "Certificate: $CERT_ID"

      - name: Build signed Tauri app
        id: build-signed
        if: steps.signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          QUILL_BUILD_COMMIT: ${{ github.sha }}
          QUILL_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          QUILL_BUILD_CHANNEL: stable
          QUILL_UPSTREAM_BASELINE: "1.2.10"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lantern ${{ github.ref_name }}"
          releaseBody: "See the [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."
          releaseDraft: true
          prerelease: false
          args: >-
            --target aarch64-apple-darwin
            --config '{"bundle":{"macOS":{"signingIdentity":"${{ steps.certificate.outputs.identity }}","entitlements":null}}}'

      - name: Build ad-hoc signed Tauri app
        id: build-adhoc
        if: steps.signing.outputs.enabled != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          QUILL_BUILD_COMMIT: ${{ github.sha }}
          QUILL_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          QUILL_BUILD_CHANNEL: stable
          QUILL_UPSTREAM_BASELINE: "1.2.10"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lantern ${{ github.ref_name }}"
          releaseBody: "See the [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Verify macOS app signature
        if: >-
          success() &&
          (steps.build-signed.outcome == 'success' || steps.build-adhoc.outcome == 'success')
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Lantern.app"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          test -d "$APP_PATH"
          test -f "$INFO_PLIST"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFO_PLIST")
          APP_EXECUTABLE="$APP_PATH/Contents/MacOS/$EXECUTABLE_NAME"
          PDFIUM_DYLIB="$APP_PATH/Contents/Frameworks/libpdfium.dylib"
          test -x "$APP_EXECUTABLE"
          test -f "$PDFIUM_DYLIB"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign --verify --strict --verbose=4 "$PDFIUM_DYLIB"

          ENTITLEMENTS=$(mktemp)
          codesign -d --entitlements "$ENTITLEMENTS" --xml "$APP_EXECUTABLE"
          if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
            APP_TEAM=$(codesign -dv --verbose=4 "$APP_EXECUTABLE" 2>&1 | awk -F= '$1 == "TeamIdentifier" { print $2 }')
            PDFIUM_TEAM=$(codesign -dv --verbose=4 "$PDFIUM_DYLIB" 2>&1 | awk -F= '$1 == "TeamIdentifier" { print $2 }')
            test -n "$APP_TEAM"
            test "$APP_TEAM" != "not set"
            test "$APP_TEAM" = "$PDFIUM_TEAM"
            if /usr/libexec/PlistBuddy -c "Print :com.apple.security.cs.disable-library-validation" "$ENTITLEMENTS" 2>/dev/null; then
              echo "Developer ID build must keep library validation enabled" >&2
              exit 1
            fi
          else
            test "$(/usr/libexec/PlistBuddy -c "Print :com.apple.security.cs.disable-library-validation" "$ENTITLEMENTS")" = "true"
          fi

          "$APP_EXECUTABLE" pdfium-smoke

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          QUILL_BUILD_COMMIT: ${{ github.sha }}
          QUILL_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          QUILL_BUILD_CHANNEL: stable
          QUILL_UPSTREAM_BASELINE: "1.2.10"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lantern ${{ github.ref_name }}"
          releaseBody: "See the [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."
          releaseDraft: true
          prerelease: false
