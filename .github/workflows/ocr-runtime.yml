name: OCR runtime

on:
  workflow_dispatch:
    inputs:
      runtime_version:
        description: Runtime version (must match an ocr-runtime-v* tag when publishing)
        required: true
        default: "1.0.0"
        type: string
  push:
    tags:
      - "ocr-runtime-v*"

permissions:
  contents: read

concurrency:
  group: ocr-runtime-${{ github.ref }}
  cancel-in-progress: false

env:
  OCR_RUNTIME_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_version || github.ref_name }}
  VCPKG_REF: 52c9e08cdf8580d2d9762f547d22b96fd81e82f2

jobs:
  build-macos:
    name: Build macOS arm64 runtime
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Assert arm64 runner
        run: test "$(uname -m)" = arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize runtime version
        shell: bash
        run: |
          version="${OCR_RUNTIME_VERSION#ocr-runtime-v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "OCR_RUNTIME_VERSION=$version" >> "$GITHUB_ENV"

      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config zstd

      - name: Checkout pinned vcpkg
        run: |
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          git -C "$RUNNER_TEMP/vcpkg" checkout --detach "$VCPKG_REF"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Build, relocate, and self-test
        run: >-
          python3 scripts/ocr-runtime/build.py
          --platform macos-arm64
          --vcpkg-root "$RUNNER_TEMP/vcpkg"
          --output-dir dist/ocr-runtime/macos-arm64

      - name: Validate manifest contract
        run: |
          python3 scripts/ocr-runtime/validate_artifacts.py dist/ocr-runtime/macos-arm64
          file dist/ocr-runtime/macos-arm64/*.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: lantern-ocr-runtime-${{ env.OCR_RUNTIME_VERSION }}-macos-arm64
          path: dist/ocr-runtime/macos-arm64/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows x64 runtime
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize runtime version
        shell: pwsh
        run: |
          $version = $env:OCR_RUNTIME_VERSION -replace '^ocr-runtime-v', ''
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$') { throw "Invalid runtime version: $version" }
          "OCR_RUNTIME_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout pinned vcpkg
        shell: pwsh
        run: |
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          git -C "$env:RUNNER_TEMP\vcpkg" checkout --detach $env:VCPKG_REF
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install zstd
        shell: pwsh
        run: choco install zstandard --version=1.5.7 -y --no-progress

      - name: Build, relocate, and self-test
        shell: pwsh
        run: |
          python scripts/ocr-runtime/build.py `
            --platform windows-x86_64 `
            --vcpkg-root "$env:RUNNER_TEMP\vcpkg" `
            --output-dir dist/ocr-runtime/windows-x86_64

      - name: Validate manifest contract
        shell: pwsh
        run: python scripts/ocr-runtime/validate_artifacts.py dist/ocr-runtime/windows-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: lantern-ocr-runtime-${{ env.OCR_RUNTIME_VERSION }}-windows-x86_64
          path: dist/ocr-runtime/windows-x86_64/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish OCR runtime release
    if: startsWith(github.ref, 'refs/tags/ocr-runtime-v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: lantern-ocr-runtime-*
          path: dist/ocr-runtime
          merge-multiple: true

      - name: Validate release payload
        run: |
          version="${GITHUB_REF_NAME#ocr-runtime-v}"
          echo "OCR_RUNTIME_VERSION=$version" >> "$GITHUB_ENV"
          python3 scripts/ocr-runtime/validate_artifacts.py dist/ocr-runtime --expected-platforms macos/arm64 windows/x86_64

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to replace runtime bytes." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" dist/ocr-runtime/* \
            --title "Lantern OCR runtime $OCR_RUNTIME_VERSION" \
            --notes "Optional fast chi_sim+eng OCR runtime for Lantern. Packages are integrity-protected by the attached HTTPS manifests and SHA-256 checksum files."
